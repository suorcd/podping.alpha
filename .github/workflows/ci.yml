name: CI/CD - gossip-listener

on:
  push:
    branches: ["master", "develop"]
    tags: ["v*"]
  pull_request:
    branches: ["master", "develop"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/gossip-listener

jobs:
  # ==========================================
  # PHASE 0: Prepare & Extract Version
  # ==========================================
  prepare:
    name: Determine Version Context
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.VERSION }}
      is_release: ${{ steps.get_version.outputs.IS_RELEASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract Version
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            # We are on master. Extract the version from Cargo.toml
            # Grabs the line starting with 'version', gets the first match, and splits by quote.
            PARSED_VERSION=$(grep '^version' gossip-listener/Cargo.toml | head -1 | cut -d '"' -f 2)
            echo "VERSION=v${PARSED_VERSION}" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
            echo "Building master. Extracted version: v${PARSED_VERSION}"

          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # We are on an explicit tag push. Use the tag name.
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
            echo "Building from tag: ${{ github.ref_name }}"

          else
            # We are on develop or a PR. Use a dev identifier.
            echo "VERSION=dev-${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
            echo "Development build."
          fi

  # ==========================================
  # PHASE 1: Build & Save Raw Binaries
  # ==========================================
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_path: target/x86_64-unknown-linux-gnu/release/gossip-listener
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin_path: target/aarch64-unknown-linux-gnu/release/gossip-listener
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            bin_path: target/armv7-unknown-linux-gnueabihf/release/gossip-listener
          - os: macos-latest
            target: x86_64-apple-darwin
            bin_path: target/x86_64-apple-darwin/release/gossip-listener
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_path: target/aarch64-apple-darwin/release/gossip-listener

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross (Linux Only)
        if: contains(matrix.os, 'ubuntu')
        run: cargo install cross --locked

      - name: Build (Linux)
        if: contains(matrix.os, 'ubuntu')
        run: cross build --release --manifest-path gossip-listener/Cargo.toml --target ${{ matrix.target }}

      - name: Build (macOS)
        if: contains(matrix.os, 'ubuntu') == false
        run: cargo build --release --manifest-path gossip-listener/Cargo.toml --target ${{ matrix.target }}

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-binary
          path: gossip-listener/${{ matrix.bin_path }}
          retention-days: 1

  # ==========================================
  # PHASE 2: Package & Publish GitHub Release
  # ==========================================
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries]
    # Run if we are on master OR an explicit tag
    if: needs.prepare.outputs.is_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Package Binaries & Generate Checksums
        run: |
          mkdir -p dist
          # Use the dynamic version outputted from the prepare job
          TAG_NAME="${{ needs.prepare.outputs.app_version }}"

          package_tar() {
            local target=$1
            local os_arch=$2
            local bin_path="artifacts/${target}-binary/gossip-listener"
            local archive_name="gossip-listener-${TAG_NAME}-${os_arch}.tar.gz"

            chmod +x "$bin_path"
            tar -czf "dist/${archive_name}" -C "artifacts/${target}-binary" gossip-listener
            cd dist && shasum -a 256 "${archive_name}" > "${archive_name}.sha256" && cd ..
          }

          package_tar "x86_64-unknown-linux-gnu" "linux-x86_64"
          package_tar "aarch64-unknown-linux-gnu" "linux-aarch64"
          package_tar "armv7-unknown-linux-gnueabihf" "linux-armv7"
          package_tar "x86_64-apple-darwin" "macos-x86_64"
          package_tar "aarch64-apple-darwin" "macos-aarch64"

      - name: Create Release and Upload Assets
        run: |
          # Use the dynamic version tag. If pushing from master, this command 
          # will automatically create the git tag at the current commit (--target).
          gh release create "${{ needs.prepare.outputs.app_version }}" dist/* \
            -R "${{ github.repository }}" \
            --title "Release ${{ needs.prepare.outputs.app_version }}" \
            --target "${{ github.sha }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # PHASE 3: Build & Push Docker Image
  # ==========================================
  build-and-push-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            # Inject our custom parsed version tag if this is a master push
            type=raw,value=${{ needs.prepare.outputs.app_version }},enable=${{ needs.prepare.outputs.is_release == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.gossip-listener
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
